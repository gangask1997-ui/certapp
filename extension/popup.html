<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px; min-height: 200px;
      background: #05080f; color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      background: #0d1117; border-bottom: 1px solid #21262d;
      padding: 12px 14px; display: flex; align-items: center; gap: 8px;
    }
    .header .logo { font-size: 1.2rem; }
    .header h1 { font-size: 0.95rem; font-weight: 700; }
    .header span { color: #2ea043; }
    .body { padding: 14px; }
    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 0.85rem; font-weight: 600;
      transition: opacity 0.15s; margin-bottom: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #2ea043; color: #fff; }
    .btn-blue { background: #1f6feb; color: #fff; }
    .btn-ghost { background: #161b22; color: #8b949e; border: 1px solid #21262d; }
    .status {
      background: #161b22; border: 1px solid #21262d; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 12px; font-size: 0.78rem; color: #8b949e;
      line-height: 1.5;
    }
    .status.ok { border-color: #2ea043; color: #2ea043; }
    .status.warn { border-color: #d29922; color: #d29922; }
    .field-count { font-size: 0.72rem; color: #8b949e; margin-bottom: 10px; text-align: center; }
    .section { font-size: 0.7rem; font-weight: 700; color: #2ea043; text-transform: uppercase; letter-spacing: 0.8px; margin: 10px 0 6px; }
    .import-area { display: none; }
    textarea {
      width: 100%; height: 80px; background: #161b22; border: 1px solid #21262d;
      border-radius: 6px; color: #e2e8f0; font-size: 0.75rem; padding: 8px;
      resize: none; outline: none; font-family: monospace;
    }
    .divider { border: none; border-top: 1px solid #21262d; margin: 10px 0; }
    .profile-preview { max-height: 140px; overflow-y: auto; }
    .pfield { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #21262d; }
    .pfield-label { color: #8b949e; font-size: 0.72rem; }
    .pfield-value { font-size: 0.72rem; max-width: 160px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🏛</div>
    <h1>Cert<span>App</span></h1>
  </div>
  <div class="body">
    <div id="status-box" class="status warn">No profile loaded. Import your profile from CertApp.</div>

    <div id="main-actions" style="display:none">
      <div class="field-count" id="field-count"></div>
      <button class="btn btn-green" id="btn-fill" onclick="fillPage()">⚡ Auto Fill This Page</button>
      <button class="btn btn-blue" onclick="highlightFields()">🔍 Highlight Detected Fields</button>
      <hr class="divider">
      <div class="section">Profile Preview</div>
      <div class="profile-preview" id="profile-preview"></div>
    </div>

    <hr class="divider">
    <div class="section">Import Profile</div>
    <button class="btn btn-ghost" onclick="toggleImport()">📂 Import .certapp file or paste JSON</button>
    <div class="import-area" id="import-area">
      <br>
      <input type="file" id="file-import" accept=".certapp,.json" style="color:#8b949e;font-size:0.75rem;margin-bottom:6px" onchange="importFile(event)" />
      <div style="text-align:center;color:#8b949e;font-size:0.72rem;margin:4px 0">— or paste JSON —</div>
      <textarea id="json-paste" placeholder='Paste JSON from CertApp "Copy as JSON"...'></textarea>
      <button class="btn btn-blue" style="margin-top:6px" onclick="importPasted()">Import</button>
    </div>

    <hr class="divider">
    <button class="btn btn-ghost" onclick="clearProfile()">🗑 Clear Saved Profile</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
