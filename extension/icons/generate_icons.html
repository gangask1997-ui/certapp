<!DOCTYPE html>
<html>
<head><title>Generate CertApp Icons</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0d1117;color:#e2e8f0">
<h2>CertApp Icon Generator</h2>
<p>Click the button to download all 3 required PNG icons, then place them in this folder.</p>
<button onclick="generateAll()" style="padding:12px 24px;background:#2ea043;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem;margin-top:12px">
  ⬇ Generate & Download All Icons
</button>
<div id="previews" style="margin-top:20px;display:flex;gap:20px;align-items:flex-end"></div>
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#0d1117';
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
  // Green accent bar at top
  ctx.fillStyle = '#2ea043';
  ctx.fillRect(0, 0, size, size * 0.08);
  // Icon emoji
  ctx.font = `${size * 0.52}px Segoe UI Emoji,Apple Color Emoji,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏛', size / 2, size * 0.58);
  // "CA" text at bottom
  ctx.font = `bold ${size * 0.16}px Segoe UI,sans-serif`;
  ctx.fillStyle = '#2ea043';
  ctx.fillText('CertApp', size / 2, size * 0.9);
  return canvas;
}

function generateAll() {
  const previews = document.getElementById('previews');
  previews.innerHTML = '';
  [16, 48, 128].forEach(size => {
    const canvas = makeIcon(size);
    // Download
    const a = document.createElement('a');
    a.download = `icon${size}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    // Preview
    const wrap = document.createElement('div');
    wrap.style.textAlign = 'center';
    canvas.style.border = '1px solid #21262d';
    canvas.style.borderRadius = '4px';
    wrap.appendChild(canvas);
    wrap.innerHTML += `<div style="font-size:11px;color:#8b949e;margin-top:4px">${size}×${size}</div>`;
    previews.appendChild(wrap);
  });
  document.querySelector('button').textContent = '✓ Icons Downloaded! Place them in this folder.';
}
</script>
</body>
</html>
